name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        working-directory: ./backend
        run: python -m py_compile app.py agent.py tools.py database.py rag.py

      - name: Run backend server smoke test
        working-directory: ./backend
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          UVICORN_PID=$!
          sleep 4
          curl -s http://localhost:8000/ && echo ""
          curl -s http://localhost:8000/ | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Unexpected: {d}'" && echo "Smoke test passed" || echo "Smoke test failed"
          kill $UVICORN_PID 2>/dev/null || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: "https://axiogpt-backend.onrender.com"
